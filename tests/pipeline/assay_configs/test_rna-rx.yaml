assay: RNA
project:
  name: default_project
  description: "Test project for RNA-seq with spike in"
assay_config:
  bigwigs:
    pileup_method:
      - deeptools
      - bamnado
      - homer
    binsize: 10
    scale_methods:
      - unscaled
      - csaw
  spikein:
    method:
      - deseq2
      - edger
      - orlando
      - with_input
    exogenous_genome: "plasmid"
    endogenous_genome: "hg38"
    control_genes:
      - AmpR_seq
      - Cas9_3p_seq
      - Cas9_5p_seq
  plot_with_plotnado: True
  has_spikein: True